<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Sipariş Defteri</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Siparişler"/>
<meta name="theme-color" content="#f7f2eb"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23c98a4b'/%3E%3Ctext y='.9em' font-size='72' x='14'%3E📋%3C/text%3E%3C/svg%3E"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:#f7f2eb;color:#3d3530;font-family:'Avenir Next','Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
input,textarea,button,select{font-family:inherit}
button{cursor:pointer}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:flex-end;padding:28px 20px 16px;border-bottom:2px solid #e6dccd}
.header-left .eyebrow{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:#b8923f;font-weight:700;margin-bottom:4px}
.header-left h1{font-family:Georgia,serif;font-size:28px;font-weight:600;color:#3d3530}
.add-btn{width:48px;height:48px;border-radius:50%;border:none;background:#c98a4b;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(201,138,75,.35)}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px}
.stat-card{background:#fffdfa;border:1px solid #e6dccd;border-radius:14px;padding:12px 14px}
.stat-label{font-size:11px;color:#9b8b7a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-value{font-size:19px;font-weight:700;font-family:Georgia,serif;color:#3d3530}
.stat-value.red{color:#b5564a}
.stat-value.green{color:#5a8a5a}

/* SEARCH */
.search-wrap{padding:0 20px 10px}
.search-box{display:flex;align-items:center;gap:8px;background:#fffdfa;border:1px solid #e6dccd;border-radius:12px;padding:10px 14px}
.search-box input{border:none;outline:none;background:transparent;font-size:15px;width:100%;color:#3d3530}

/* FILTERS */
.filters{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto}
.chip{flex-shrink:0;padding:7px 14px;border-radius:999px;border:1px solid #e6dccd;background:#fffdfa;color:#7a6f63;font-size:13px;white-space:nowrap}
.chip.active{background:#3d3530;color:#fff;border-color:#3d3530}

/* LIST */
.list{padding:0 20px;display:flex;flex-direction:column;gap:10px;padding-bottom:30px}
.empty{display:flex;flex-direction:column;align-items:center;gap:12px;padding:50px 20px;text-align:center;color:#9b8b7a;font-size:14px}
.empty-icon{font-size:40px}

/* CARD */
.card{background:#fffdfa;border:1px solid #e6dccd;border-radius:16px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:10px;padding:14px 16px}
.card-main{flex:1;min-width:0}
.card-cari{font-weight:600;font-size:15px;font-family:Georgia,serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-urun{font-size:13px;color:#9b8b7a;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-right{text-align:right;flex-shrink:0}
.card-tutar{font-weight:700;font-size:15px;font-family:Georgia,serif;margin-bottom:4px}
.badges{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.badge{font-size:10.5px;padding:3px 8px;border-radius:999px;font-weight:600;white-space:nowrap}
.chevron{font-size:14px;color:#9b8b7a;flex-shrink:0;transition:transform .2s}
.chevron.open{transform:rotate(180deg)}

/* CARD BODY */
.card-body{border-top:1px solid #f0e8dc;padding:14px 16px 16px;display:none}
.card-body.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:14px}
.detail-row{display:flex;flex-direction:column;gap:2px}
.detail-row.full{grid-column:1/-1}
.detail-label{font-size:11px;color:#9b8b7a;text-transform:uppercase;letter-spacing:.05em}
.detail-value{font-size:14px;color:#3d3530}
.card-actions{display:flex;gap:10px}
.action-btn{display:flex;align-items:center;gap:6px;border:1px solid #e6dccd;background:#fff;border-radius:10px;padding:8px 14px;font-size:13px;color:#7a6f63}
.action-btn.del{color:#b5564a}

/* MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(61,53,48,.4);display:flex;align-items:flex-end;justify-content:center;z-index:50;display:none}
.overlay.open{display:flex}
.modal{background:#f7f2eb;width:100%;max-width:480px;max-height:92vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid #e6dccd;flex-shrink:0}
.modal-header h2{font-family:Georgia,serif;font-size:19px}
.close-btn{border:none;background:#ece2d4;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#7a6f63}
.modal-body{overflow-y:auto;padding:8px 20px 12px;flex:1}
.modal-footer{display:flex;gap:10px;padding:14px 20px;border-top:1px solid #e6dccd;background:#f7f2eb;flex-shrink:0}

/* FORM */
.section{padding:14px 0;border-bottom:1px solid #ece2d4}
.section-title{font-size:12px;font-weight:700;color:#b8923f;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#9b8b7a;margin-bottom:5px}
.field label .req{color:#c98a4b}
.input{width:100%;border:1px solid #e6dccd;background:#fffdfa;border-radius:10px;padding:10px 12px;font-size:15px;color:#3d3530}
.input:focus{outline:2px solid #c98a4b;outline-offset:1px}
textarea.input{min-height:70px;resize:vertical}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toggle-row{display:flex;gap:8px}
.toggle-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #e6dccd;background:#fffdfa;color:#9b8b7a;font-size:14px}
.toggle-btn.active{border-color:#c98a4b;background:#c98a4b1a;color:#c98a4b;font-weight:600}
.total-preview{font-size:14px;color:#7a6f63;margin-top:6px}
.check-row{display:flex;align-items:center;gap:10px;border:none;background:transparent;padding:8px 0;font-size:14px;width:100%;text-align:left;color:#7a6f63}
.check-row.checked{color:#3d3530}
.check-icon{font-size:20px}
.select-grid{display:flex;flex-direction:column;gap:8px}
.select-opt{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px solid #e6dccd;background:#fffdfa;color:#7a6f63;font-size:14px;text-align:left;width:100%}
.range{width:100%}
.cancel-btn{flex:1;padding:13px;border-radius:12px;border:1px solid #e6dccd;background:#fffdfa;color:#7a6f63;font-size:15px}
.save-btn{flex:2;padding:13px;border-radius:12px;border:none;background:#c98a4b;color:#fff;font-size:15px;font-weight:600}
.save-btn:disabled{opacity:.5}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="eyebrow">Lüle Atölyesi</div>
    <h1>Sipariş Defteri</h1>
  </div>
  <button class="add-btn" onclick="openForm()">+</button>
</div>

<div class="stats">
  <div class="stat-card"><div class="stat-label">Toplam Ciro</div><div class="stat-value" id="s-ciro">0,00 ₺</div></div>
  <div class="stat-card"><div class="stat-label">Bekleyen Alacak</div><div class="stat-value" id="s-alacak">0,00 ₺</div></div>
  <div class="stat-card"><div class="stat-label">Hazır Değil</div><div class="stat-value" id="s-hazir">0</div></div>
  <div class="stat-card"><div class="stat-label">Teslim Bekleyen</div><div class="stat-value" id="s-teslim">0</div></div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="search" placeholder="Cari, ürün veya telefon ara…" oninput="render()"/>
  </div>
</div>

<div class="filters" id="filters">
  <button class="chip active" onclick="setFilter('hepsi',this)">Tümü</button>
  <button class="chip" onclick="setFilter('odeme',this)">Ödeme Bekleyen</button>
  <button class="chip" onclick="setFilter('hazir',this)">Hazır Değil</button>
  <button class="chip" onclick="setFilter('teslim',this)">Teslim Bekleyen</button>
  <button class="chip" onclick="setFilter('fatura',this)">Fatura Bekleyen</button>
</div>

<div class="list" id="list"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeForm(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Yeni Sipariş</h2>
      <button class="close-btn" onclick="closeFormDirect()">✕</button>
    </div>
    <div class="modal-body">

      <div class="section">
        <div class="section-title">Cari Bilgileri</div>
        <div class="field"><label>Cari adı / Müşteri <span class="req">*</span></label>
          <input class="input" id="f-cari" placeholder="Ad Soyad / Firma"/></div>
        <div class="field"><label>Telefon</label>
          <input class="input" id="f-tel" placeholder="05xx xxx xx xx"/></div>
      </div>

      <div class="section">
        <div class="section-title">Ürün ve Fiyat</div>
        <div class="field"><label>Ürün adı <span class="req">*</span></label>
          <input class="input" id="f-urun" placeholder="Örn: Menemen kil lüle"/></div>
        <div class="two-col">
          <div class="field"><label>Adet</label><input type="number" min="1" class="input" id="f-adet" value="1" oninput="updateTotal()"/></div>
          <div class="field"><label>Birim fiyat (₺)</label><input type="number" min="0" step="0.01" class="input" id="f-fiyat" value="0" oninput="updateTotal()"/></div>
        </div>
        <div class="field"><label>KDV durumu</label>
          <div class="toggle-row">
            <button class="toggle-btn active" id="kdv-dahil" onclick="setKdv(true)">KDV Dahil</button>
            <button class="toggle-btn" id="kdv-haric" onclick="setKdv(false)">KDV Hariç</button>
          </div>
        </div>
        <div class="total-preview">Toplam: <strong id="f-toplam">0,00 ₺</strong></div>
      </div>

      <div class="section">
        <div class="section-title">Fatura</div>
        <button class="check-row" id="cb-fatura-kesilecek" onclick="toggleCheck('fatura-kesilecek')">
          <span class="check-icon">⭕</span><span>Fatura kesilecek</span>
        </button>
        <button class="check-row" id="cb-fatura-kesildi" onclick="toggleCheck('fatura-kesildi')" style="display:none">
          <span class="check-icon">⭕</span><span>Fatura kesildi</span>
        </button>
      </div>

      <div class="section">
        <div class="section-title">Hazırlık Durumu</div>
        <div class="select-grid" id="hazirlik-grid"></div>
        <div class="field" id="yuzde-field" style="display:none;margin-top:10px">
          <label id="yuzde-label">Hazır oranı: %0</label>
          <input type="range" min="0" max="100" step="5" class="range" id="f-yuzde" value="0" oninput="document.getElementById('yuzde-label').textContent='Hazır oranı: %'+this.value"/>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Teslimat</div>
        <div class="select-grid" id="teslimat-grid"></div>
        <button class="check-row" id="cb-teslim-edildi" onclick="toggleCheck('teslim-edildi')" style="display:none">
          <span class="check-icon">⭕</span><span id="teslim-label">Teslim edildi</span>
        </button>
      </div>

      <div class="section">
        <div class="section-title">Ödeme</div>
        <div class="select-grid" id="odeme-grid"></div>
        <div class="field" id="kismi-field" style="display:none;margin-top:10px">
          <label>Alınan tutar (₺)</label>
          <input type="number" min="0" step="0.01" class="input" id="f-alinan" value="0"/>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Notlar</div>
        <textarea class="input" id="f-notlar" placeholder="Ek bilgi, renk tercihi, vb."></textarea>
      </div>

    </div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeFormDirect()">Vazgeç</button>
      <button class="save-btn" id="save-btn" onclick="saveForm()">Siparişi Ekle</button>
    </div>
  </div>
</div>

<script>
const KEY = 'lule-siparisler-v1';
let orders = [];
let editingId = null;
let activeFilter = 'hepsi';

const HAZIRLIK = [
  {v:'bekliyor',l:'Bekliyor',c:'#9b8b7a'},
  {v:'hazirlaniyor',l:'Hazırlanıyor',c:'#c98a4b'},
  {v:'kismen-hazir',l:'Kısmen Hazır',c:'#b8923f'},
  {v:'hazir',l:'Hazır',c:'#5a8a5a'},
];
const TESLIMAT = [
  {v:'belirsiz',l:'Belirlenmedi'},
  {v:'kargo',l:'Kargo'},
  {v:'elden',l:'Elden'},
];
const ODEME = [
  {v:'alinmadi',l:'Alınmadı',c:'#b5564a'},
  {v:'kismi',l:'Kısmi Ödeme',c:'#b8923f'},
  {v:'alindi',l:'Alındı',c:'#5a8a5a'},
];

// form state
let fState = {kdvDahil:true, hazirlik:'bekliyor', teslimat:'belirsiz', odeme:'alinmadi',
  'fatura-kesilecek':false,'fatura-kesildi':false,'teslim-edildi':false};

function load(){
  try{const r=localStorage.getItem(KEY);if(r)orders=JSON.parse(r)||[];}catch(e){}
  render();
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(orders));}catch(e){}}

function fmt(n){return (Number(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺';}
function total(o){return (Number(o.adet)||0)*(Number(o.birimFiyat)||0);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  // stats
  const tot=orders.reduce((s,o)=>s+total(o),0);
  const paid=orders.reduce((s,o)=>{
    if(o.odeme==='alindi')return s+total(o);
    if(o.odeme==='kismi')return s+(Number(o.alinanTutar)||0);
    return s;
  },0);
  const bek=tot-paid;
  document.getElementById('s-ciro').textContent=fmt(tot);
  const alEl=document.getElementById('s-alacak');
  alEl.textContent=fmt(bek);
  alEl.className='stat-value '+(bek>0?'red':'green');
  document.getElementById('s-hazir').textContent=orders.filter(o=>o.hazirlik!=='hazir').length;
  document.getElementById('s-teslim').textContent=orders.filter(o=>!o.teslimatYapildi).length;

  // filter
  const q=(document.getElementById('search').value||'').toLowerCase();
  let list=orders.filter(o=>{
    if(q&&!(o.cari.toLowerCase().includes(q)||o.urun.toLowerCase().includes(q)||(o.tel||'').includes(q)))return false;
    if(activeFilter==='odeme')return o.odeme!=='alindi';
    if(activeFilter==='hazir')return o.hazirlik!=='hazir';
    if(activeFilter==='teslim')return !o.teslimatYapildi;
    if(activeFilter==='fatura')return o.faturaKesilecek&&!o.faturaKesildi;
    return true;
  }).sort((a,b)=>b.ts-a.ts);

  const el=document.getElementById('list');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📦</div><div>'+(orders.length?'Bu filtreye uyan sipariş bulunamadı.':'Henüz sipariş yok. + ile ekleyin.')+'</div></div>';
    return;
  }
  el.innerHTML=list.map(o=>{
    const h=HAZIRLIK.find(x=>x.v===o.hazirlik)||HAZIRLIK[0];
    const od=ODEME.find(x=>x.v===o.odeme)||ODEME[0];
    const t=total(o);
    const kalan=o.odeme==='alindi'?0:o.odeme==='kismi'?t-(Number(o.alinanTutar)||0):t;
    return `<div class="card">
      <div class="card-head" onclick="toggleCard('${o.id}')">
        <div class="card-main">
          <div class="card-cari">${esc(o.cari)}</div>
          <div class="card-urun">${esc(o.urun)} · ${o.adet} adet</div>
        </div>
        <div class="card-right">
          <div class="card-tutar">${fmt(t)}</div>
          <div class="badges">
            <span class="badge" style="background:${h.c}22;color:${h.c}">${h.l}</span>
            <span class="badge" style="background:${od.c}22;color:${od.c}">${od.l}</span>
          </div>
        </div>
        <span class="chevron" id="chev-${o.id}">▼</span>
      </div>
      <div class="card-body" id="body-${o.id}">
        <div class="detail-grid">
          <div class="detail-row"><div class="detail-label">Birim Fiyat</div><div class="detail-value">${fmt(o.birimFiyat)} ${o.kdvDahil?'(KDV dahil)':'(KDV hariç)'}</div></div>
          <div class="detail-row"><div class="detail-label">Toplam</div><div class="detail-value">${fmt(t)}</div></div>
          <div class="detail-row"><div class="detail-label">Telefon</div><div class="detail-value">${esc(o.tel||'—')}</div></div>
          <div class="detail-row"><div class="detail-label">Fatura</div><div class="detail-value">${!o.faturaKesilecek?'Kesilmeyecek':o.faturaKesildi?'Kesildi ✓':'Bekliyor'}</div></div>
          <div class="detail-row"><div class="detail-label">Hazırlık</div><div class="detail-value">${o.hazirlik==='kismen-hazir'?`Kısmen hazır (%${o.hazirlikYuzde})`:h.l}</div></div>
          <div class="detail-row"><div class="detail-label">Teslimat</div><div class="detail-value">${(TESLIMAT.find(x=>x.v===o.teslimat)||TESLIMAT[0]).l}${o.teslimat!=='belirsiz'?(o.teslimatYapildi?' — Teslim edildi ✓':' — Bekliyor'):''}</div></div>
          <div class="detail-row"><div class="detail-label">Ödeme</div><div class="detail-value">${o.odeme==='kismi'?`${fmt(o.alinanTutar)} alındı, ${fmt(kalan)} kaldı`:od.l}</div></div>
          ${o.notlar?`<div class="detail-row full"><div class="detail-label">Not</div><div class="detail-value">${esc(o.notlar)}</div></div>`:''}
        </div>
        <div class="card-actions">
          <button class="action-btn" onclick="editOrder('${o.id}')">✏️ Düzenle</button>
          <button class="action-btn del" onclick="delOrder('${o.id}')">🗑 Sil</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggleCard(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}

// ---- Form ----
function buildSelectGrid(id,opts,val,onchange){
  document.getElementById(id).innerHTML=opts.map(o=>`
    <button class="select-opt" id="opt-${id}-${o.v}" onclick="${onchange}('${o.v}')"
      style="${val===o.v?`border-color:${o.c||'#c98a4b'};background:${(o.c||'#c98a4b')}1a;color:${o.c||'#c98a4b'}`:''}">
      <span>${val===o.v?'🔘':'⚪'}</span> ${o.l}
    </button>`).join('');
}

function openForm(order){
  editingId=order?order.id:null;
  document.getElementById('modal-title').textContent=order?'Siparişi Düzenle':'Yeni Sipariş';
  document.getElementById('save-btn').textContent=order?'Kaydet':'Siparişi Ekle';

  document.getElementById('f-cari').value=order?order.cari:'';
  document.getElementById('f-tel').value=order?order.tel:'';
  document.getElementById('f-urun').value=order?order.urun:'';
  document.getElementById('f-adet').value=order?order.adet:1;
  document.getElementById('f-fiyat').value=order?order.birimFiyat:0;
  document.getElementById('f-alinan').value=order?order.alinanTutar:0;
  document.getElementById('f-notlar').value=order?order.notlar:'';
  document.getElementById('f-yuzde').value=order?order.hazirlikYuzde:0;
  document.getElementById('yuzde-label').textContent='Hazır oranı: %'+(order?order.hazirlikYuzde:0);

  fState={
    kdvDahil:order?order.kdvDahil:true,
    hazirlik:order?order.hazirlik:'bekliyor',
    teslimat:order?order.teslimat:'belirsiz',
    odeme:order?order.odeme:'alinmadi',
    'fatura-kesilecek':order?order.faturaKesilecek:false,
    'fatura-kesildi':order?order.faturaKesildi:false,
    'teslim-edildi':order?order.teslimatYapildi:false,
  };

  setKdv(fState.kdvDahil);
  updateTotal();
  buildSelectGrid('hazirlik-grid',HAZIRLIK,fState.hazirlik,'setHazirlik');
  buildSelectGrid('teslimat-grid',TESLIMAT,fState.teslimat,'setTeslimat');
  buildSelectGrid('odeme-grid',ODEME,fState.odeme,'setOdeme');
  updateChecks();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeFormDirect(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeForm(e){if(e.target===document.getElementById('overlay'))closeFormDirect();}

function setKdv(v){
  fState.kdvDahil=v;
  document.getElementById('kdv-dahil').className='toggle-btn'+(v?' active':'');
  document.getElementById('kdv-haric').className='toggle-btn'+(!v?' active':'');
}

function updateTotal(){
  const t=(Number(document.getElementById('f-adet').value)||0)*(Number(document.getElementById('f-fiyat').value)||0);
  document.getElementById('f-toplam').textContent=fmt(t);
}

function toggleCheck(key){
  fState[key]=!fState[key];
  updateChecks();
}

function updateChecks(){
  const setBtn=(id,checked)=>{
    const btn=document.getElementById('cb-'+id);
    if(!btn)return;
    btn.className='check-row'+(checked?' checked':'');
    btn.querySelector('.check-icon').textContent=checked?'✅':'⭕';
  };
  setBtn('fatura-kesilecek',fState['fatura-kesilecek']);
  setBtn('fatura-kesildi',fState['fatura-kesildi']);
  setBtn('teslim-edildi',fState['teslim-edildi']);
  document.getElementById('cb-fatura-kesildi').style.display=fState['fatura-kesilecek']?'flex':'none';
  document.getElementById('cb-teslim-edildi').style.display=fState.teslimat!=='belirsiz'?'flex':'none';
  const tLabel=document.getElementById('teslim-label');
  if(tLabel)tLabel.textContent=fState.teslimat==='kargo'?'Kargoya verildi':'Elden teslim edildi';
}

function setHazirlik(v){
  fState.hazirlik=v;
  buildSelectGrid('hazirlik-grid',HAZIRLIK,v,'setHazirlik');
  document.getElementById('yuzde-field').style.display=v==='kismen-hazir'?'block':'none';
}
function setTeslimat(v){
  fState.teslimat=v;
  buildSelectGrid('teslimat-grid',TESLIMAT,v,'setTeslimat');
  updateChecks();
}
function setOdeme(v){
  fState.odeme=v;
  buildSelectGrid('odeme-grid',ODEME,v,'setOdeme');
  document.getElementById('kismi-field').style.display=v==='kismi'?'block':'none';
}

function saveForm(){
  const cari=document.getElementById('f-cari').value.trim();
  const urun=document.getElementById('f-urun').value.trim();
  if(!cari||!urun)return;
  const o={
    id:editingId||uid(),
    cari,urun,
    tel:document.getElementById('f-tel').value.trim(),
    adet:Number(document.getElementById('f-adet').value)||1,
    birimFiyat:Number(document.getElementById('f-fiyat').value)||0,
    kdvDahil:fState.kdvDahil,
    faturaKesilecek:fState['fatura-kesilecek'],
    faturaKesildi:fState['fatura-kesildi'],
    hazirlik:fState.hazirlik,
    hazirlikYuzde:Number(document.getElementById('f-yuzde').value)||0,
    teslimat:fState.teslimat,
    teslimatYapildi:fState['teslim-edildi'],
    odeme:fState.odeme,
    alinanTutar:Number(document.getElementById('f-alinan').value)||0,
    notlar:document.getElementById('f-notlar').value.trim(),
    ts:editingId?(orders.find(x=>x.id===editingId)||{ts:Date.now()}).ts:Date.now(),
  };
  if(editingId){orders=orders.map(x=>x.id===editingId?o:x);}
  else{orders=[o,...orders];}
  save();render();closeFormDirect();
}

function editOrder(id){
  const o=orders.find(x=>x.id===id);
  if(o)openForm(o);
}
function delOrder(id){
  if(!confirm('Bu siparişi silmek istediğine emin misin?'))return;
  orders=orders.filter(x=>x.id!==id);
  save();render();
}

load();
</script>
</body>
</html>
